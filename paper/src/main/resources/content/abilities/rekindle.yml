# Rekindle -- the Fire Ranger's retreat, and the deliberate opposite of Ember Step.
# Ember Step is Mage-COMMIT (dash IN). Rekindle is Ranger-KITE: throw a forward fan of
# embers, then dash straight BACKWARD, leaving a denial zone between you and what you fled.
#
# The cast is a reverse-facing dash (the retreat); the embers ride its on_hit as a
# throw_embers effect, which fires ONCE from the pre-dash feet -- so the embers land in
# front of where you stood, then you back away from them. Each ember arcs, lands, marks the
# spot, and after a 1-second fuse bursts (mob-only) in a 4-block radius.

id: rekindle
display_name: "<gold>Rekindle</gold>"   # MiniMessage, not legacy color codes
element: fire
archetype: ranger
cooldown_ticks: 200          # tune on the --refresh-content loop, not in Java

cost:
  resource: energy
  amount: 35

cast:
  type: dash
  direction: reverse_facing  # ALWAYS opposite facing -- a straight backpedal, ignoring WASD
  distance: 12               # match Ember Step's reach
  speed: 2.3                 # match Ember Step
  lift: 0.3                  # match Ember Step

# Fired once from the caster's PRE-dash feet (throw_embers is untargeted). The fan points
# FORWARD (opposite the reverse dash); the dash sweeps backward through nothing in particular.
on_hit:
  - type: throw_embers
    angles_degrees: [0, 40, -40]   # a wide three-ember fan, centred on facing
    speed: 0.6                     # sets the landing distance (~speed * 10 ticks aloft = ~6 blocks); tune on the loop
    gravity: 0.05                  # the arc
    launch_lift: 0.25              # a touch of up so the ember arcs rather than skims
    max_lifetime_ticks: 40         # if it somehow lands on nothing, it still goes off
    trail: ember_trail             # flame trail so the throw reads as a thrown ember
    on_impact:
      - type: delayed_burst        # planted where the ember lands (a wall stops it short)
        marker: blaze_powder       # display-only; shows where it will go off
        fuse_ticks: 20             # 1 second
        burst:
          radius: 4.0
          effects:
            - { type: damage, amount: 8, element: fire }
            - { type: status, status_id: scorch, duration_ticks: 60 }
