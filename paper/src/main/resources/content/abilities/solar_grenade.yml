# The content pipeline. Adding an ability = adding a file like this one.
# If you ever find yourself adding an ability in Java, something has gone wrong.

id: solar_grenade
display_name: "<gold>Solar Grenade</gold>"   # MiniMessage, not legacy color codes
element: fire
archetype: hunter
cooldown_ticks: 200

cost:
  resource: energy
  amount: 40

cast:
  type: projectile
  speed: 1.2
  gravity: 0.03
  max_lifetime_ticks: 100

on_hit:
  # The direct hit. Only whatever the grenade actually struck takes this, and a
  # grenade that lands on the ground strikes nothing at all.
  - type: damage
    amount: 8
    element: fire

  - type: visual
    visual_id: solar_detonation

  # The blast. Lands on the detonation frame, on everyone in radius, whether or
  # not the grenade hit anything directly. This is what makes it read as an
  # explosion rather than as a delayed fire.
  - type: burst
    radius: 4.0
    effects:
      - type: damage
        amount: 6
        element: fire
      - type: status
        status_id: scorch
        duration_ticks: 40
      # rooted_TEMP: a boot-test fixture, NOT Rooted's real home. The grenade burst
      # hits mobs reliably, so it is a convenient trigger to witness the per-tick
      # Immobilize primitive in-game (mob held in place; killed rooted mob = clean
      # console). REMOVE this when Rooted gets its own ability in the status content
      # pass -- the way /rpg swing_TEMP came out once the swing listener shipped.
      - type: status
        status_id: rooted
        duration_ticks: 60

  # The field left behind. Its first pulse is one tick_interval later, by design.
  # It re-applies scorch so that standing in the fire keeps you burning.
  - type: area
    radius: 4.0
    duration_ticks: 100
    tick_interval: 20
    effects:
      - type: damage
        amount: 2
        element: fire
      - type: status
        status_id: scorch
        duration_ticks: 40
        amplifier: 0
