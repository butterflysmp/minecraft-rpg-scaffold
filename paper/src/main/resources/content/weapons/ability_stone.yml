# The Ability Stone -- a dev instrument, not a real weapon. Its click casts the ability
# under test WHILE YOU MOVE, which a command cannot do: opening chat to type /rpg cast
# releases WASD, so a command can only ever produce the stationary look-fallback. Hold the
# stone, hold movement keys, click -> getCurrentInput() reads live movement.
#
# It is a weapon only because a weapon trigger IS an ability's cast plus an input -- so the
# whole hardened click-to-fire path (packet swing listener, WeaponFire) is reused, no new
# casting code. To test a different ability, edit the trigger below and --refresh-content.
#
# Permanent, like /rpg apply -- NOT a _TEMP fixture. Ships in NO kit; a normal player never
# has it. Gated only by /rpg give needing rpg.command.give.

id: ability_stone
display_name: "<light_purple>Ability Stone</light_purple>"
element: kinetic          # neutral -- it is a tool, not a themed weapon
rarity: common
material: amethyst_shard

triggers:
  # Left-click casts the ability under test. Free and no cooldown so you can spam it while
  # tuning -- retune per ability under test. Currently mirrors rekindle.yml so the stone casts
  # the REAL Rekindle (reverse-facing dash + forward ember fan), not a look-alike. To test a
  # different ability, replace this trigger and --refresh-content.
  left_click:
    cooldown_ticks: 0
    cast:
      type: dash
      direction: reverse_facing
      distance: 12
      speed: 2.3
      lift: 0.3
    on_hit:
      - { type: visual, visual_id: rekindle_cast }
      - type: throw_embers
        angles_degrees: [0, 40, -40]
        speed: 0.6          # ~6-block landing distance; tune on the --refresh-content loop
        gravity: 0.05
        launch_lift: 0.25
        max_lifetime_ticks: 40
        trail: ember_trail
        on_impact:
          - type: delayed_burst
            marker: blaze_powder
            fuse_ticks: 20
            visual: ember_burst
            burst:
              radius: 4.0
              effects:
                - { type: damage, amount: 8, element: fire }
                - { type: status, status_id: scorch, duration_ticks: 60 }
