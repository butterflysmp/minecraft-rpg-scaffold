# The detonation of a planted ember: a flame flash and an explosion crack, played at the
# landing point when the 1-second fuse fires. Id is the filename: ember_burst.

steps:
  - type: particle
    particle: FLAME          # a MODEST flash -- kept tight so three near-simultaneous
    count: 10                # detonations don't read as scattered clutter (was 30 / spread 1.0)
    spread: 0.3

  - type: sound
    key: entity.generic.explode
    volume: 1.0
    pitch: 1.0
