name: Rpg
version: '${project.version}'
main: io.github.yourname.rpg.paper.RpgPlugin
description: Class-based action RPG
authors: [ yourname ]

# Minimum server version, not the pinned one. Minecraft moved to year-based
# versioning at 26.1, and Paper accepts the drop-level string here.
api-version: '26.1'

dependencies:
  server:
    packetevents:
      load: BEFORE
      required: true
      join-classpath: true
