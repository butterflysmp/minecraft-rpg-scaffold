name: Rpg
version: '${project.version}'
main: io.github.butterflysmp.rpg.paper.RpgPlugin
description: Class-based action RPG
authors: [ CreaperCrusher ]

# Minimum server version, not the pinned one. Minecraft moved to year-based
# versioning at 26.1, and Paper accepts the drop-level string here.
#
# Confirmed loading: Paper 26.1.2 build 74. Not assumed -- the plugin enabled and
# logged its content counts. Any other drop is untested.
api-version: '26.1'

dependencies:
  server:
    packetevents:
      load: BEFORE
      required: true
      join-classpath: true

# An undeclared node defaults to op-only, so a missing entry here silently locks
# players out of their own abilities. Keep this in step with Permissions.java.
permissions:
  rpg.command.cast:
    description: Cast an ability. Everyone -- this is the game.
    default: true
  rpg.command.class:
    description: Pick a class. Everyone -- choosing one is the game too.
    default: true
  rpg.command.admin:
    description: Inspect loaded ability content.
    default: op
