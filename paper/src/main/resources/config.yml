# Rpg plugin configuration. Edit and restart the server to apply (no rebuild).

immobilize:
  # How far (in blocks) an immobilized mob may drift before the per-tick position
  # anchor snaps it back.
  #
  # DEFAULT 0 = snap every tick = genuinely still. The anchor correction runs AFTER the
  # AI has moved the mob, so any nonzero value is the amplitude of a sawtooth (drift up
  # to the value, then snap): small -> jitter, large -> creep. There is no good nonzero
  # value; 0 is the fix. This knob exists only as an escape hatch.
  anchor-drift-blocks: 0.0
