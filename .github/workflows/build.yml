name: build

# Why this workflow exists:
#
#   The daily loop is `./mvnw -pl core test`, which never compiles paper/ at all.
#   A non-exhaustive switch over a sealed interface -- EffectSpec, CastSpec,
#   VisualSpec, StatusDefinition -- is a compile error in paper/, and it can sit
#   undiscovered for as long as nobody runs a full build. ContentValidator had
#   exactly that hole. Compiling paper/ on every push is what closes it. That is
#   the mechanism, and it is the whole mechanism.
#
#   `clean` below is NOT that mechanism. Measured on 2026-07-10: a plain
#   `./mvnw -B compile` on a warm target/ already recompiles paper/ when core/
#   changes, and reports the exhaustiveness error. maven-compiler-plugin sees the
#   changed dependency module. On a fresh runner there is no target/ to delete, so
#   `clean` is measurably inert here today. It is kept as defence-in-depth, against
#   a future target/ cache action, a self-hosted runner, or a warm checkout -- not
#   because the check depends on it. See ContentValidator's javadoc.

on:
  push:
  pull_request:

# A newer push to the same ref makes the older run's answer worthless.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          # Caches ~/.m2, which `clean` does not touch. `clean` deletes target/.
          # The two do not interact.
          cache: maven

      # Both repositories the build resolves from -- repo.papermc.io and
      # repo.codemc.io -- are public. No credentials are configured or needed.
      - name: Build and test
        run: ./mvnw -B clean verify

      # A green build that ran no tests is indistinguishable from a green build
      # that ran all of them. Surefire prints nothing at all when a bad -Dtest
      # pattern matches nothing, and BUILD SUCCESS looks the same either way.
      # Fail loudly rather than let that read as a pass.
      - name: Assert tests actually ran
        if: success()
        run: |
          set -euo pipefail
          reports=$(find . -path '*/target/surefire-reports/*.txt' | wc -l)
          if [ "$reports" -eq 0 ]; then
            echo "::error::No surefire reports found. Zero tests ran."
            exit 1
          fi
          total=$(grep -h -o 'Tests run: [0-9]*' $(find . -path '*/target/surefire-reports/*.txt') \
                  | awk '{s += $3} END {print s+0}')
          echo "Tests run across all modules: $total (from $reports report files)"
          if [ "$total" -eq 0 ]; then
            echo "::error::Surefire reports exist but ran 0 tests."
            exit 1
          fi
